services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
      HOST: "0.0.0.0"
      PORT: "8000"
      AUTH_REQUIRED: "true"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-true}"
    volumes:
      - app-data:/data
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  app-data:
  caddy-data:
  caddy-config:
